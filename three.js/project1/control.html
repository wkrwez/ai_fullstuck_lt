<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta
          name="viewport"
          content="width=device-width, initial-scale=1.0"
        />
        <title>Document</title>
        <style>
          * {
            margin: 0;
            padding: 0;
          }
          html,
          body {
            width: 100%;
            height: 100%;
          }
          .canvas-box {
            display: flex;
          }
          .cvs1,
          .cvs2 {
            border: 1px solid #ccc;
          }
        </style>
      </head>
      <body>
        <!-- 视觉圆周运动 -->
        <script type="module">
          import * as THREE from "three";
          // 创建场景

          const scene = new THREE.Scene();
          //   添加背景
          scene.background = new THREE.Color(0x000000);

          // 创建透视相机
          const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000,
          );

          camera.position.set(2, 80, 20);
          // 更改视野方向，向上下左右看
          camera.lookAt(0, 0, 0);
          //   创建渲染器,追加到对应的DOM
          const renderer = new THREE.WebGLRenderer({
            // canvas: document.querySelector(".cvs2"),
            antialias: true,
          });
          renderer.setSize(window.innerWidth, window.innerHeight);
          document.body.appendChild(renderer.domElement);
          const cube1 = new THREE.Mesh(
            new THREE.BoxGeometry(10, 10, 10),
            new THREE.MeshBasicMaterial({ color: 0xff0000 }),
          );

          const gridHelper = new THREE.GridHelper(100, 10, 0xffffff);
          scene.add(gridHelper, cube1);

          //   添加到场景，多个
          //   scene.add(cube1, cube2);
          function animate() {
            requestAnimationFrame(animate);
            cube1.rotation.x += 0.01;
            cube1.rotation.y += 0.01;

            renderer.render(scene, camera);
          }
          animate();
          let isDown = false;
          let startX = 0;
          let currentX = 0;

          renderer.domElement.addEventListener("mousedown", (e) => {
            isDown = true;
            startX = e.clientX;
          });
          renderer.domElement.addEventListener("mousemove", (e) => {
            if (isDown) {
              const distance = e.clientX - startX;

              currentX += distance * 0.01;
              startX = e.clientX;
              camera.position.x = 40 * Math.cos(currentX);
              camera.position.z = 40 * Math.sin(currentX);
              camera.lookAt(0, 0, 0);
            }
          });

          renderer.domElement.addEventListener("mouseup", (e) => {
            isDown = false;
          });
        </script>
      </body>
    </html>
  </body>
</html>
