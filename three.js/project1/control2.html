<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta
          name="viewport"
          content="width=device-width, initial-scale=1.0"
        />
        <title>Document</title>
        <style>
          * {
            margin: 0;
            padding: 0;
          }
          html,
          body {
            width: 100%;
            height: 100%;
          }
          .canvas-box {
            display: flex;
          }
          .cvs1,
          .cvs2 {
            border: 1px solid #ccc;
          }
        </style>
      </head>
      <body>
        <!-- 使用OrbitControls -->
        <script type="module">
          import * as THREE from "three";
          import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
          // 创建场景
          const loader = new THREE.CubeTextureLoader();
          loader.setPath("image/"); // 图片文件夹路径

          const cubeTexture = loader.load([
            "px.jpg", // 右 +X
            "nx.jpg", // 左 -X
            "py.jpg", // 上 +Y
            "ny.jpg", // 下 -Y
            "pz.jpg", // 后 -Z
            "nz.jpg", // 前 +Z
          ]);
          const scene = new THREE.Scene();
          //   添加背景
          scene.background = cubeTexture;
          scene.fog = new THREE.Fog("#ffffff", 1, 100);
          // 创建透视相机
          const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000,
          );

          camera.position.set(2, 80, 20);
          // 更改视野方向，向上下左右看
          camera.lookAt(0, 0, 0);
          //   创建渲染器,追加到对应的DOM
          const renderer = new THREE.WebGLRenderer({
            // canvas: document.querySelector(".cvs2"),
            antialias: true,
          });
          renderer.setSize(window.innerWidth, window.innerHeight);
          document.body.appendChild(renderer.domElement);
          const cube1 = new THREE.Mesh(
            new THREE.BoxGeometry(10, 10, 10),
            new THREE.MeshBasicMaterial({ color: 0xff0000 }),
          );

          const gridHelper = new THREE.GridHelper(100, 10, 0xffffff);
          scene.add(gridHelper, cube1);
          // 会一直生效，如果不渲染会看不到效果
          const controls = new OrbitControls(camera, renderer.domElement);
          //   阻尼,惯性，需要调用update
          controls.enableDamping = true;
          //   添加监听change
          controls.addEventListener("change", function () {
            renderer.render(scene, camera);
          });
          //   renderer.render(scene, camera);
          function animate() {
            requestAnimationFrame(animate);
            controls.update();
            scene.rotation.set(2, 3, 4);
            renderer.render(scene, camera);
          }
          animate();
        </script>
      </body>
    </html>
  </body>
</html>
